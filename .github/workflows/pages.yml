name: Pages

on:
  push:
    branches:
      - master
      - main
    paths:
      - ".github/workflows/pages.yml"
      - "index.html"
      - "mock-projects.js"
      - "data/**"
      - "scripts/**"
  pull_request:
    branches:
      - master
      - main
    paths:
      - ".github/workflows/pages.yml"
      - "index.html"
      - "mock-projects.js"
      - "data/**"
      - "scripts/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate static site
        run: node scripts/validate-site.mjs

  build:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 5
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages artifact
        run: node scripts/prepare-pages.mjs .pages-dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .pages-dist

  deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
